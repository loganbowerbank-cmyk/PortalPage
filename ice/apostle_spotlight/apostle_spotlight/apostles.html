<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apostle Spotlight</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="spotlight-card">
        <h1>First Presidency</h1>
        
        <div class="grid-content">
            <div class="presidency-row">
                <div class="portrait-container">
                    <img src="images/eyring.webp" alt="President Eyring">
                </div>
                <div class="portrait-container">
                    <img src="images/oaks.webp" alt="President Oaks">
                </div>
                <div class="portrait-container">
                    <img src="images/christofferson.webp" alt="President Christofferson">
                </div>
            </div>

            <div class="quorum-grid">
                <h2>Quorum of the Twelve Apostles</h2>
                
                <div class="portrait-container">
                    <img src="images/uchtdorf.webp" alt="Elder Uchtdorf">
                </div>
                <div class="portrait-container">
                    <img src="images/bednar.webp" alt="Elder Bednar">
                </div>
                <div class="portrait-container">
                    <img src="images/cook.webp" alt="Elder Cook">
                </div>
                <div class="portrait-container">
                    <img src="images/anderson.webp" alt="Elder Andersen">
                </div>

                <div class="portrait-container">
                    <img src="images/rasband.webp" alt="Elder Rasband">
                </div>
                <div class="portrait-container">
                    <img src="images/stevenson.webp" alt="Elder Stevenson">
                </div>
                <div class="portrait-container">
                    <img src="images/renlund.webp" alt="Elder Renlund">
                </div>
                <div class="portrait-container">
                    <img src="images/gong.webp" alt="Elder Gong">
                </div>

                <div class="portrait-container">
                    <img src="images/soares.webp" alt="Elder Soares">
                </div>
                <div class="portrait-container">
                    <img src="images/kearon.webp" alt="Elder Kearon">
                </div>
                <div class="portrait-container">
                    <img src="images/causse.webp" alt="Bishop Caussé">
                </div>
                <div class="portrait-container">
                    <img src="images/gilbert.webp" alt="Elder Gilbert">
                </div>
            </div>
        </div>
    </div>

</body>
</html>
